<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0a0a0f"/>
  <!-- Magnifying glass circle -->
  <circle cx="43" cy="42" r="18" fill="none" stroke="#f5a623" stroke-width="7"/>
  <!-- Magnifying glass handle -->
  <line x1="56" y1="56" x2="72" y2="72" stroke="#f5a623" stroke-width="7" stroke-linecap="round"/>
  <!-- Fedora brim -->
  <ellipse cx="43" cy="26" rx="22" ry="5" fill="#f5a623"/>
  <!-- Fedora crown -->
  <rect x="30" y="12" width="26" height="15" rx="6" fill="#f5a623"/>
  <!-- Fedora indent -->
  <rect x="38" y="12" width="10" height="5" rx="3" fill="#0a0a0f"/>
</svg>
